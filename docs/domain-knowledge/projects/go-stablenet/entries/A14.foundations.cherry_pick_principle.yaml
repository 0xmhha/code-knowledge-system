procedure_steps:
- Before editing a geth-origin file, check `.claude/docs/build-source-files.md` — is the file marked 'StableNet 고유'? If not,
  your StableNet-specific logic belongs in a NEW file.
- Place StableNet-unique logic in a sibling file named `*_istanbul.go` / `*_stablenet.go` / `tx_fee_delegation.go` etc.
- Restrict edits to geth-origin files to MINIMAL hook points (interface dispatch, registration).
- When adding a new StableNet-unique file, update the table in `.claude/docs/build-source-files.md`.
pitfalls:
- Inlining StableNet-specific branches into a geth-origin file 'because it's simpler' — creates merge conflicts on the next
  upstream pick.
- Renaming or restructuring a geth file because the StableNet diff has grown — same effect.
- Putting new feature logic in `core/blockchain.go` / `eth/handler.go` instead of in a sibling _istanbul.go file.
