invariants:
  - PRE-PREPARE for round r > 0 carries a JUSTIFICATION; receivers verify it before accepting the proposal.
  - A validator that has Prepared on value v in round r stays 'locked' on v until a higher round produces a quorum-justified different value.
  - Justification payload format (RoundChange + Prepare signatures) is part of the consensus contract — changes affect cross-version interop.
pitfalls:
  - Skipping `isJustified` for a 'happy path' on round 0 only — and then enabling the skip path for round > 0 by accident.
  - Loosening signature checks on piggybacked justification payloads (handler.go:265) — accepts unjustified pre-prepares.
  - Changing JustificationPrepares aggregation rule without re-proving safety — same surface, different semantics, silent fork.
