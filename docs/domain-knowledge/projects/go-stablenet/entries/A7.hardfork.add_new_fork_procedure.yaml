invariants:
  - "Each new fork's block number must be >= the previous fork's block number (enforced by CheckConfigForkOrder)."
  - "CollectUpgrades must return entries in ascending block order; the WBFT runtime breaks on the first block > target, so out-of-order entries silently lose later upgrades."
  - "In ActiveNativeManagers, the newest fork case must appear first because Go switch-case picks the first matching branch."

pitfalls:
  - "Adding the new ChainConfig field but forgetting Rules + Rules() update — runtime branches never fire because rules.IsMyNewFork is always false."
  - "Skipping CollectUpgrades registration — the fork's system contracts never deploy at the activation block."
  - "Skipping SetConfigFromChainConfig update — WBFT parameter changes never reach the consensus engine."
  - "Adding the new switch case at the bottom of ActiveNativeManagers — an older fork above matches first and the new addresses are ignored."

