id: A7.hardfork.add_new_fork_procedure
subsystem: A7
knowledge_type: B6
title: "Procedure: adding a new hardfork to go-stablenet"

summary: |
  Adding a hardfork requires changes in seven distinct sites:
  ChainConfig field, isFork check method, Rules struct + Rules() build,
  runtime branch in the relevant subsystem, optional NativeManager
  switch update, optional system contract version pinning via
  CollectUpgrades, and updates to SetConfigFromChainConfig when WBFT
  parameters change. The block number must be >= the previous fork's
  block number; switch-case ordering must place the newest fork on top
  because the first matching case wins.

procedure_steps:
  - "Step 1 — params/config.go: add a new field to ChainConfig (e.g. MyNewForkBlock *big.Int)."
  - "Step 2 — params/config.go: add an activation check method (IsMyNewFork) that delegates to isBlockForked."
  - "Step 3 — params/config.go: add IsMyNewFork to the Rules struct and to the Rules() builder so runtime sites can branch on it."
  - "Step 4 — runtime sites: add 'if rules.IsMyNewFork { ... } else { ... }' branches wherever behaviour diverges."
  - "Step 5 — core/vm/native_manager.go: update ActiveNativeManagers switch if the fork rotates native manager addresses. Put the newest fork's case at the top."
  - "Step 6 — params/config.go: define MyNewFork *AnzeonConfig with SystemContracts overrides, then register the upgrade in CollectUpgrades (append a Upgrade{Block: MyNewForkBlock, SystemContracts: MyNewFork.SystemContracts})."
  - "Step 7 — eth/ethconfig/config.go: extend SetConfigFromChainConfig to append a Transition{Block: MyNewForkBlock, WBFTConfig: ...} when the fork changes WBFT parameters; record the block in hfTransitionBlocks to detect duplicates."
  - "Step 8 (verification) — run 'go test ./params/... ./consensus/wbft/... ./core/...' and check that CheckConfigForkOrder accepts the new fork's block ordering."

code_anchors:
  - file: params/config.go
    symbol: ChainConfig
    reason: "fork block field and IsXxx methods live here"
  - file: params/config.go
    symbol: ChainConfig.CollectUpgrades
    reason: "ascending-block-order upgrade registry"
  - file: params/config.go
    symbol: ChainConfig.CheckConfigForkOrder
    reason: "enforces that each fork's block is >= the previous"
  - file: eth/ethconfig/config.go
    symbol: SetConfigFromChainConfig
    reason: "binds ChainConfig hardforks into the WBFT runtime config"
  - file: core/vm/native_manager.go
    symbol: ActiveNativeManagers
    reason: "newest-fork-on-top switch ordering rule"

