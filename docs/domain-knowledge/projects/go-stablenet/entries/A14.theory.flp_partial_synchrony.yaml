invariants:
  - Safety holds under asynchrony; liveness holds only after Global Stabilization Time + bounded Δ.
  - Round-change timeout is the implementation of the partial-synchrony assumption — its scheduling discipline is consensus-critical.
  - Lowering RequestTimeout below network round-trip + processing latency causes perpetual round-changes (no liveness).
pitfalls:
  - Tuning RequestTimeout for benchmark throughput without modeling wide-area network latency.
  - Removing or gating the round-change timer in a 'happy path' optimization — safety still holds but liveness can stall indefinitely.
  - Conflating 'asynchronous' (no timing assumption) with 'partial synchrony' (eventual bounded delays) when reading or writing protocol logic.
