    reason: "RoundRobin selector: pick = (lastProposerIndex + round + 1) % N"
  - file: consensus/wbft/validator/default.go
    symbol: stickyProposer
    reason: "Sticky selector: pick = (lastProposerIndex + round) % N"
  - file: consensus/wbft/validator/default.go
    symbol: defaultSet.QuorumSize
    reason: "WBFT quorum = ceil(N - F) over equal-power validators"
