id: A3.validator_set.set_construction
subsystem: A3
knowledge_type: B1
title: "WBFT validator set construction and proposer selection"
summary: |
  An in-memory WBFT validator set is built by the validator package:
  New(addr, blsKey) wraps one validator (defaultValidator) and
  NewSet(addrs, blsKeys, policy) / NewSetByValidators(validators, policy)
  build a defaultSet. newDefaultSet seeds the set's validators slice in
  the order the caller supplied — there is no internal sort — and picks
  the proposer selector based on policy.Id: roundRobinProposer for the
  RoundRobin policy (advances by seed = lastProposerIndex + round + 1)
  and stickyProposer for the Sticky policy (same seed minus the +1, so
  the proposer stays put across rounds with the same lastProposer).
  defaultSet protects mutations of validators with validatorMu (RWMutex);
  CalcProposer recomputes the active proposer via the selected selector,
  and QuorumSize returns ceil(N - (N-1)/3) — the WBFT 2N/3 quorum over
  equal-power validators. The deterministic order that callers feed in
  is the ordering that all selectors then index into.
code_anchors:
  - file: consensus/wbft/validator/validator.go
    symbol: NewSetByValidators
    reason: "construct a ValidatorSet from a pre-built Validators slice (callers preserve their own order)"
  - file: consensus/wbft/validator/validator.go
    symbol: NewSet
    reason: "construct a ValidatorSet from parallel addrs / blsPublicKeys slices"
  - file: consensus/wbft/validator/default.go
