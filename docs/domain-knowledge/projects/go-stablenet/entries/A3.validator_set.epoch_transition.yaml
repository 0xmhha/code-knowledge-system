invariants:
- EpochInfo is non-nil only on the last block of an epoch. Any other block carrying EpochInfo is a protocol violation.
- EpochInfo.Validators contains indices into EpochInfo.Candidates — never addresses. Direct address access requires looking
  up Candidates[Validators[i]].Addr.
- BLSPublicKeys has the same length as Validators.
- The validator set for block N is determined by the most recent block <= N that carried an EpochInfo; the genesis block seeds
  the first epoch via WBFTInit.
pitfalls:
- Writing EpochInfo on a non-epoch-boundary block breaks header validation on every other node — symptoms are widespread block
  rejections from peers.
- Treating EpochInfo.Validators as addresses instead of indices retrieves wrong validators and breaks signature verification.
- Forgetting to query GetValidatorsForVerifying on a boundary block (using only GetValidators) misses the previous-epoch set
  needed to verify the seals on that boundary block itself.
