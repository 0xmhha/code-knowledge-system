invariants:
  - "Each handler is idempotent for duplicate messages from the same sender at the same view (sequence, round)."
  - "Per-round state progresses strictly StatePreprepared -> StatePrepared -> StateCommitted; out-of-order messages are buffered or rejected."
pitfalls:
  - "Treating a PREPARE quorum as committable proof: PREPARE quorum only justifies the prepared block inside ROUND-CHANGE messages. Block finalisation requires a COMMIT quorum."
