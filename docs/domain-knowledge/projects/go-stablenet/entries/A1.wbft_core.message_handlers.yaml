    reason: "validates proposer signature and block, transitions to StatePreprepared"
  - file: consensus/wbft/core/prepare.go
    symbol: "Core.handlePrepareMsg"
    line: 87
    reason: "accumulates PREPARE messages, transition to StatePrepared at QuorumSize"
  - file: consensus/wbft/core/commit.go
    symbol: "Core.handleCommitMsg"
    line: 90
    reason: "accumulates COMMIT messages, finalises block at QuorumSize"
