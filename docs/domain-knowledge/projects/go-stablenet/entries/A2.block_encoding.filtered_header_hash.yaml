invariants:
  - "Block hashes are computed over WBFTFilteredHeader, not the raw header."
  - "WBFTFilteredHeader zeros Round and removes PreparedSeal / CommittedSeal, but leaves PrevRound / PrevPreparedSeal / PrevCommittedSeal untouched (those are part of the canonical block)."
  - "IstanbulExtraVanity (32) and IstanbulExtraSeal (96) are fixed — changing them invalidates every existing block."

pitfalls:
  - "Hashing the raw header produces a hash that disagrees with every other node and breaks signature verification."
  - "Forgetting to strip Round means the proposer's hash differs from each follower's once they observe their own round value."
  - "Confusing PrevRound (kept) with Round (stripped); both live in WBFTExtra but play different roles in hashing."

