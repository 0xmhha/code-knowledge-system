invariants:
  - "Phase 1 runs before Phase 2; Phase 2 entries with Block != 0 are skipped here and handled by processFinalize at runtime."
  - "applyUpgradeOverlay replaces Code only; Balance and Storage written by Phase 1 are preserved unless the upgrade explicitly supplies State entries."
  - "initializeXxx() functions are called only on Version == \"v1\" during Phase 1 — running them again during an overlay would corrupt storage."
  - "CollectUpgrades returns entries in ascending block order; the runtime path relies on this and breaks on the first block > target, so out-of-order genesis entries silently drop later upgrades."

pitfalls:
  - "Adding a block-0 hardfork that supplies a Params map intended to re-initialize storage — the overlay path will not run the initializer, producing a contract whose storage layout disagrees with its code."
  - "Assuming Mainnet behaviour generalises to Testnet: Mainnet BohoBlock = 0 so Boho's GovMinter v2 is applied via overlay; Testnet BohoBlock = 100 so the overlay is skipped and v2 only appears later via processFinalize."
  - "Skipping CollectUpgrades wiring for a new hardfork — the overlay never runs and the upgraded contract code is never deployed."

