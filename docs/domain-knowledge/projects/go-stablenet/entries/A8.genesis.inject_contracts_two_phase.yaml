id: A8.genesis.inject_contracts_two_phase
subsystem: A8
knowledge_type: B3
title: "InjectContracts two-phase deploy: baseline then block-0 hardfork overlay"

summary: |
  InjectContracts seeds genesis.Alloc with system contract code and
  storage in two ordered phases. Phase 1 calls
  GetSystemContractsTransition with config.Anzeon.SystemContracts —
  this deploys every v1 contract and runs each initializeXxx() to
  populate its full Solidity storage layout. Phase 2 iterates
  config.CollectUpgrades() and applies, for each upgrade whose block
  is 0, applyUpgradeOverlay onto the same Alloc. The overlay path
  REPLACES the contract Code only and merges any explicit State
  entries; pre-existing Balance and Storage from Phase 1 are
  preserved. Upgrades whose Block is not 0 are skipped at genesis
  time and are instead applied at runtime by Engine.processFinalize
  when the chain reaches their activation height.

