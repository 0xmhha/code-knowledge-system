id: A4.gov_validator.storage_and_governance
subsystem: A4
knowledge_type: B2
title: "GovValidator (0x1001): storage layout and validator-set governance"
summary: |
  GovValidator is the system contract at address 0x1001 that owns the
  on-chain validator set. Its storage layout is defined by the
  SLOT_VALIDATOR_* constants in systemcontracts/gov_validator.go, which
  MUST mirror the slot annotations in solidity/v1/GovValidator.sol:
  blsPoP precompile address (0x32), the __validators EnumerableSet.AddressSet
  (value slot 0x33 + length, index mapping at 0x34), validatorToOperator
  (0x35), operatorToValidator (0x36), validatorToBlsKey (0x37),
  blsKeyToValidator (0x38) and gasTip (0x39). Slots 0x0..0x31 are reserved
  for the inherited GovBase. initializeValidator seeds all of these at
  genesis from systemContracts.govValidator.params (members, validators,
  blsPublicKeys, optional gasTip), keeping the validators array, the
  operator<->validator mappings and the BLS-key mappings index-aligned per
  member. Mutating the set at runtime goes through GovBase's m-of-n
  governance: an active member calls configureValidator (direct, gated by
  onlyActiveMember) for its own slot, while quorum changes go through
  proposeChangeQuorum / proposeAddMember / proposeRemoveMember +
  approveProposal, which auto-executes once approvals reach the snapshotted
  quorum (requiredApprovals).
