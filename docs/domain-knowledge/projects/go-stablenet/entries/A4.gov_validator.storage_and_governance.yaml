invariants:
  - "Slots 0x0..0x31 are reserved for the inherited GovBase; GovValidator's own fields start at 0x32 (blsPoP)."
  - "The validators array and the per-validator BLS keys are kept index-aligned: initializeValidator writes validator i, its operator/member mapping, and blsKeys[i] in the same loop iteration."
  - "validatorToOperator and operatorToValidator are maintained as inverse mappings; likewise validatorToBlsKey and blsKeyToValidator. Adding/removing a validator must update both directions."
  - "len(members) == len(validators) == len(blsPublicKeys) is enforced by initializeValidator; mismatched genesis params error out."
  - "The Go SLOT_VALIDATOR_* constants must byte-for-byte match the Solidity slot annotations in GovValidator.sol; the file header explicitly warns that changing them requires updating the contract."
  - "Validator-set / quorum changes only take effect once approveProposal reaches the snapshotted requiredApprovals (m-of-n quorum)."
pitfalls:
  - "Changing a SLOT_VALIDATOR_* constant (or the Solidity field order) without migrating existing storage and reindexing every reader (ValidatorList, GetBLSPublicKey, GetGasTip and the EnumerableSet helpers) silently corrupts validator-set reads. Cross-reference A3.validator_set.epoch_transition, which consumes ValidatorList."
  - "__validators is an EnumerableSet: value slot 0x33 holds the length and the array elements, while its index mapping lives at the next slot (0x34, derived via IncrementHash). Treating 0x33 as a plain array without the 0x34 index slot breaks membership/removal."
  - "blsKeyToValidator is keyed by raw bytes (variable-length); initializeValidator uses a blsWrapper to feed the key bytes into CalculateMappingSlot. Hashing the wrong representation (e.g. padded hash vs raw bytes) yields a wrong slot."
  - "initializeValidator only runs for Version == v1 (genesis params path); upgrades to a later version must not re-run initialization or they would overwrite existing storage."
  - "gasTip defaults to params.InitialGasTip when govValidator.params.gasTip is absent; do not assume zero."
