invariants:
  - "Any change touching c.current, round-state, or consensus locks must pass `go test -race` on the touched package before merge."
  - "After the change, observed quorum behaviour must match QuorumSize = ceil(N - F); a finalization that succeeds with fewer commits indicates a broken safety bound."
  - "Round-0 finalization rate must not regress and no fork/stall may appear in istanbul.status RoundDistribution after the change."
pitfalls:
  - "Relying on unit tests alone for a consensus change: low-contention unit tests rarely interleave the goroutines that expose a race in c.current — only `go test -race` and a multi-node network surface it."
  - "Skipping the integration/regression network test because unit tests are green: safety/liveness bugs (forks, stalls) only manifest with multiple nodes and adversarial timing under chainbench."
  - "Default chainbench profile funds only validators + one endpoint account; a regression that appears to fail on consensus may actually be an unfunded-account error — fund extra accounts explicitly."
