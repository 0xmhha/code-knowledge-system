invariants:
  - "Bit 63 = Blacklisted, bit 62 = Authorized — these are consensus-reachable and must not be reused."
  - "Mutation functions (Set*/Clear*) return a new uint64; they do not mutate the receiver. Reassign the result or the change is lost."
  - "A bit outside AccountExtraValidMask in a stored StateAccount means corruption or an unrecognised flag from a different fork."
  - "New flags must be guarded by a hardfork rule if they affect block validity, because nodes on the older fork will not honour the bit."

pitfalls:
  - "Calling SetBlacklisted(extra) without reassigning the return value is a silent no-op."
  - "Reusing bit 61 or below without checking AccountExtraValidMask membership leads to flags that other code paths ignore."
  - "Forgetting to add the new flag to AccountExtraValidMask means subsequent validity checks reject accounts that carry it."

