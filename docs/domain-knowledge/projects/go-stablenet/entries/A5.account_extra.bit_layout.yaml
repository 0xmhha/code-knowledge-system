id: A5.account_extra.bit_layout
subsystem: A5
knowledge_type: B4
title: "StateAccount.Extra bit layout and immutability invariants"

summary: |
  StateAccount.Extra is a uint64 carrying per-account flags. Bit 63
  (MSB) marks Blacklisted; bit 62 marks Authorized; bits 0-61 are
  reserved. All mutation helpers (SetBlacklisted, ClearBlacklisted,
  SetAuthorized, ClearAuthorized) follow an immutable pattern — they
  take the existing uint64 and return a new uint64 with the requested
  bit toggled. The original value is never modified in place. New
  flags must claim a previously unused bit and may require hardfork
  gating if they affect consensus-reachable state.

