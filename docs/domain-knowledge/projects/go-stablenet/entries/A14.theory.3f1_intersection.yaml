invariants:
  - Any quorum claimed by protocol code must equal valSet.QuorumSize() — never hardcoded 2f+1 or N/2+1.
  - F = floor((N−1)/3); Q = ceil(N − F). The two quantities together encode the safety bound.
  - Validator-signature aggregations added outside the consensus state machine MUST honor the same Q.
pitfalls:
  - Using PBFT-textbook 2f+1 — diverges from ceil(N−F) for N not of form 3f+1; under-counts the safe quorum.
  - Using simple majority N/2+1 — far too low; trivially unsafe.
  - Treating F as int — loses the (N−1)/3 fractional part that ceil compensates for.
