invariants:
  - Txpool maps (pending/queue/all) are mutated ONLY by `pool.loop()`.
  - External producers (RPC, sealer, p2p) enqueue events; they do NOT touch the maps directly.
  - The reorg loop is the serialization boundary — there is no per-map lock to fall back on.
pitfalls:
  - Mutating pool.pending / pool.queue from a non-loop goroutine — data race on map iteration.
  - Adding a sealer fast-path that filters pool.all without going through the loop's snapshot mechanism.
  - Assuming a per-map sync.Mutex exists — the design uses the loop as the lock, not per-map mutexes.
