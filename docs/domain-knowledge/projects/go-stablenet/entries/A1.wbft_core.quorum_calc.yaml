invariants:
- QuorumSize is exactly ceil(N - F) with F = (N-1)/3; the live code computes it in float64 via math.Ceil (default.go:226).
  Any alternative formula must yield the identical value for every N.
- QuorumSize is always >= 1, including N = 1 (ceil(1 - 0) = 1).
- Prepare/Commit state transitions compare with >= QuorumSize, not >.
pitfalls:
- 'Reimplementing the quorum with a DIFFERENT formula. PBFT-textbook 2f+1 and simple-majority N/2+1 diverge from ceil(N-F)
  for N != 3f+1, producing a LOWER quorum that finalizes with too few honest nodes (safety violation). N=5: ceil=4, 2f+1=3;
  N=6: ceil=5, 2f+1=3; N=8: ceil=6, 2f+1=5.'
- Forgetting that QuorumSize covers both Prepare and Commit independently — each phase needs its own quorum.
