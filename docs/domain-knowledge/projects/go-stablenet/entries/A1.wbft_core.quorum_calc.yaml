invariants:
  - "ValidatorSet.F() returns float64. Casting to int before division loses precision and produces a wrong QuorumSize for some N."
  - "QuorumSize is always >= 1, including N = 1 (ceil(1 - 0) = 1)."
  - "Prepare/Commit state transitions compare with >= QuorumSize, not >."

pitfalls:
  - "Using int(F()) instead of float64 produces off-by-one errors. For N = 4, F = 1.0 and QuorumSize = ceil(3.0) = 3; truncating F to int 1 still works, but for larger sets the rounding behaviour diverges."
  - "Forgetting that QuorumSize covers both Prepare and Commit independently — each phase needs its own quorum."

