    symbol: "defaultSet.F"
    line: 222
    reason: "F = (N-1)/3 as float64 — integer cast would lose precision"
  - file: consensus/wbft/validator/default.go
    symbol: "defaultSet.QuorumSize"
    line: 226
    reason: "QuorumSize = ceil(N - F) using math.Ceil over float64"
  - file: consensus/wbft/core/prepare.go
    symbol: "Core.handlePrepareMsg"
    line: 121
    reason: "threshold check that gates StatePrepared transition"
  - file: consensus/wbft/types.go
