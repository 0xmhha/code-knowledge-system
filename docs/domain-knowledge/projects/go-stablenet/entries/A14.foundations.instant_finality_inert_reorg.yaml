invariants:
  - Once a WBFT-Committed block is written, it is final; there is no honest reorg path.
  - ForkChoice / TotalDifficulty code paths are inert geth residue, not StableNet truth.
  - Reorg-related changes that affect consensus belong in consensus/wbft/, not in core/forkchoice.go.
pitfalls:
  - Extending core/forkchoice.go to influence StableNet block selection.
  - Reading TotalDifficulty as a meaningful chain-quality metric.
  - Adding logic that depends on honest reorg ever happening (e.g. retrying tx inclusion on a different fork).
