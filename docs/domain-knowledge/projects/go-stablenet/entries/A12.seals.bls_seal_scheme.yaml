invariants:
  - WBFT seals are BLS aggregate (96 bytes), not ECDSA (65 bytes).
  - SealerSet bitpack identifies the validator subset whose votes are aggregated; the bit layout is part of consensus.
  - Filtered-header hash excludes seal fields, so seals can be added post-hash without changing the block hash.
pitfalls:
  - Calling ecrecover on a BLS signature — wrong primitive, returns garbage.
  - Hashing the seal payload with Keccak before BLS verify — primitives have their own hash-to-curve.
  - Reordering SealerSet bits — same signature now claims a different validator subset.
  - Embedding ECDSA-sized buffers ([65]byte) when serializing extra-data.
