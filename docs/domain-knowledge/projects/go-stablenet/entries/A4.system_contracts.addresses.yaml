id: A4.system_contracts.addresses
subsystem: A4
knowledge_type: B7
title: "System contract canonical addresses (Anzeon)"

summary: |
  Five governance system contracts and two native precompiles are
  deployed at well-known fixed addresses on go-stablenet. Source of
  truth for the contract addresses is params/config_wbft.go; precompile
  addresses live alongside native manager registration in
  core/vm/native_manager.go. These values are referenced everywhere in
  hardfork wiring, genesis JSON, and ABI tooling.

