id: A4.system_contracts.addresses
subsystem: A4
knowledge_type: B7
title: "System contract canonical addresses (Anzeon)"

summary: |
  Five governance system contracts and two native precompiles are
  deployed at well-known fixed addresses on go-stablenet. Source of
  truth for the 0x100x governance addresses is params/config_wbft.go;
  the 0xB000xx precompile address literals are params/protocol_params.go
  (NativeCoinManager 0xB00002, AccountManager 0xB00003), which
  core/vm/native_manager.go references when registering their method
  tables. These values are referenced everywhere in hardfork wiring,
  genesis JSON, and ABI tooling.

