pitfalls:
  - "Adding logic to setSignatureValues thinking it covers the Sender signature — Sender's V/R/S lives on the embedded SenderTx and is set by the embedded DynamicFeeTx's setSignatureValues, not the wrapper."
  - "Forgetting to verify both Sender and FeePayer signatures during transaction validation — verifying only Sender allows a forged FeePayer to be inserted."
  - "Computing gas pricing from FeePayer's GasFeeCap/GasTipCap — there is no such field. The FeePayer only signs; gas price comes from SenderTx (the inner DynamicFeeTx)."
  - "Missing the FeePayer blacklist check in TransitionDb (verification ③ in stablenet-features.md §10) — a blacklisted FeePayer can otherwise still pay for a non-blacklisted Sender's transaction."

