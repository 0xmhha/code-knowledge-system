invariants:
  - Every active validator has voting power = 1.
  - Quorum is computed as ceil(N − F) over counts, not over stake sums.
  - No validator struct, set struct, or selection routine reads a Power/Weight/Stake field.
pitfalls:
  - Adding stake-weighted voting or weighted proposer selection — there is no stake to weight.
  - Implementing slashing — there is no slashable stake; misbehavior is handled by governance removal.
  - Extrapolating from Ethereum PoS / WEMIX governance assumptions.
