invariants:
  - "AnzeonTipEnv is only consulted on chains where IsAnzeon returns true at the current block; pre-Anzeon blocks use the standard tip path."
  - "The cached state is invalidated when SetCurrentBlock observes a new block whose state root or header GasTip differs from the cache."

pitfalls:
  - "Reusing a stale AnzeonTipEnv across a reorg can yield wrong authorisation answers: the consumer must call SetCurrentBlock on each new block before reading GetAnzeonTipCap."

