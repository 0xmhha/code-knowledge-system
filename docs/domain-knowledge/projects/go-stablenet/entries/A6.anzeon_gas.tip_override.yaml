id: A6.anzeon_gas.tip_override
subsystem: A6
knowledge_type: B3
title: "Anzeon authorized-account gas tip override"

summary: |
  Under the Anzeon hardfork, AnzeonTipEnv overrides the effective gas
  tip for transactions signed by authorised accounts. GetAnzeonTipCap
  returns the transaction's own GasTipCap (the sender's chosen tip)
  for authorised senders, and the block header's GasTip for everyone
  else. Authorisation is read from StateAccount.Extra at the current
  block's state root; AnzeonTipEnv caches the lookup per block to avoid
  re-reading state on every transaction.

