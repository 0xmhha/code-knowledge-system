  - file: core/vm/native_manager.go
    symbol: "coinManagerBurn.Run"
    line: 225
    reason: "executes burn(address,uint256): debits account, decreases total supply"
  - file: core/vm/native_manager.go
    symbol: "coinManagerTransfer.Run"
    line: 259
    reason: "executes transfer(from,to,amount) with no supply change"
  - file: core/vm/native_manager.go
