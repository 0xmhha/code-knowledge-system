id: A5.native_coin.issuance_burn_flow
subsystem: A5
knowledge_type: B3
title: "Native coin issuance and burn via NativeCoinManager precompile"

summary: |
  Native coin mint, burn, and transfer are precompile operations on
  NativeCoinManager. coinManagerMint credits a target address;
  coinManagerBurn debits an account; coinManagerTransfer moves between
  accounts without changing total supply. All three gate on
  canRunCoinManger, which requires the caller to be NativeCoinAdapter
  (0x1000) and the opcode to be CALL (not DELEGATECALL or STATICCALL).
  Total-supply changes therefore route exclusively through 0x1000.

