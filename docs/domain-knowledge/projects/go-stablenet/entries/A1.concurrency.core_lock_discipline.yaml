  - "Every write of c.current is inside currentMutex.Lock(); the write region covers the full mutation, not just the pointer swap."
  - "priorState.RWMutex is a separate lock for prior-state snapshots, not a substitute for currentMutex."
pitfalls:
  - "Reading c.current.Sequence() for telemetry without acquiring currentMutex.RLock — data race."
  - "Acquiring priorState's lock instead of currentMutex — wrong lock, same struct family."
  - "Partial write under Lock (e.g. allocating a new state outside Lock, then swapping the pointer inside) — readers may observe a half-initialized state."
