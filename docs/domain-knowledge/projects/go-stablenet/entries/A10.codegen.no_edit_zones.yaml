invariants:
  - "Files in systemcontracts/artifacts/v{N}/ mirror the corresponding Solidity sources in systemcontracts/solidity/v{N}/. Any divergence is a regenerate-or-revert situation."
  - "compile/main.go's srcFiles[i] must align with contractBins[i] index-for-index. A misaligned pair compiles successfully but registers bytecode under the wrong contract name."
  - "gen_*.go and gen_*_rlp.go files start with a code-generated header. Editing past the header is allowed only when also updating the source type and re-running the generator."
  - "Lint is configured to exclude core/genesis_alloc.go (large generated file) and crypto/bn256/ (third-party); other generated files are not excluded — they pass lint as-is because the generator emits compliant code."

pitfalls:
  - "Hand-editing systemcontracts/artifacts/v{N}/<Contract> to apply a quick fix — the next compile run overwrites the change, and CI catches the resulting diff on every PR."
  - "Adding a Solidity contract without appending to both srcFiles and contractBins in compile/main.go — compile succeeds but go:embed fails at build time because the artifact file is missing."
  - "Editing a gen_*.go file directly instead of updating the source type and rerunning gencodec — the next regen overwrites the edit."

