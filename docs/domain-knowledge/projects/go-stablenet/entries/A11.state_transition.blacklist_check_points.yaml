invariants:
  - "Every blacklist check is gated by rules.IsAnzeon — pre-Anzeon nodes do not apply these guards."
  - "msg.To == nil indicates contract creation; the Recipient (②) check intentionally skips this case."
  - "FeePayer (③) check fires only when st.msg.FeePayer is non-nil, i.e. for fee delegation transactions; it must run before any balance debit from the FeePayer."
  - "Zero-address (④) and precompile-transfer guards run inside EVM.Call, so they catch CALL/CALLCODE/DELEGATECALL transfers that did not go through TransitionDb."

pitfalls:
  - "Adding a new transaction type that introduces an alternative balance-debit path without re-running checks ①~③ — funds can move from a blacklisted account."
  - "Adding a new transfer opcode handler that bypasses EVM.Call (or that calls a lower-level routine) — check ④ is missed and zero-address / precompile transfers leak through."
  - "Reading 'contract creation exempt from check ②' as 'contract creation exempt from all blacklist checks' — Sender (①) still applies to the contract creator."
  - "Wiring FeePayer (③) check after the FeePayer balance debit instead of before — the debit happens even when the FeePayer is blacklisted, leaving inconsistent state on a rejected tx."

