id: A11.state_transition.blacklist_check_points
subsystem: A11
knowledge_type: B3
title: "Blacklist check points along the state transition path"

summary: |
  When rules.IsAnzeon is active, a transaction can be rejected for
  blacklist reasons at four distinct points before its state changes
  persist. Three live in core/state_transition.go TransitionDb (Sender,
  Recipient, FeePayer) and one lives in core/vm/evm.go Call (zero
  address / native precompile transfer). Adding a new transaction type
  or a new transfer path requires confirming every one of these gates
  still fires; missing one creates a route by which a blacklisted
  account can move value.

code_anchors:
  - file: core/state_transition.go
    symbol: "StateTransition.TransitionDb"
    line: 504
    reason: "check ①: Sender (msg.From) blacklist — ErrBlacklistedAccount returned"
  - file: core/state_transition.go
    symbol: "StateTransition.TransitionDb"
    line: 509
    reason: "check ②: Recipient (msg.To) blacklist — contract creation exempt because msg.To == nil"
  - file: core/state_transition.go
    symbol: "StateTransition.TransitionDb"
    line: 577
    reason: "check ③: FeePayer blacklist — only when st.msg.FeePayer != nil and rules.IsAnzeon"
  - file: core/vm/evm.go
    symbol: "EVM.Call"
    line: 212
    reason: "check ④: zero-address transfer block (ErrZeroAddressTransfer) and precompile transfer block (ErrValueTransferToPrecompile)"
  - file: core/vm/evm.go
    symbol: "EVM.Call"
    line: 481
    reason: "additional caller blacklist guard inside EVM.Call when Anzeon is active"

code_keywords:
