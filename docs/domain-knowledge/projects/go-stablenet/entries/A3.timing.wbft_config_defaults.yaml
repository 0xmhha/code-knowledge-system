id: A3.timing.wbft_config_defaults
subsystem: A3
knowledge_type: B7
title: "WBFT timing and config defaults: RequestTimeout, BlockPeriod, EpochLength"

summary: |
  WBFT consensus timing is parameterised by RequestTimeoutSeconds (per-
  round timeout before bumping rounds), BlockPeriodSeconds (target
  inter-block interval enforced by the proposer), and EpochLength
  (blocks per epoch, after which the validator set transitions). The
  Anzeon default config sets these to 2 / 1 / 10 respectively; chains
  may override per-network. CheckValidity enforces ranges at genesis
  load time.

code_anchors:
  - file: params/config_wbft.go
    symbol: WBFTConfig
    line: 186
    reason: "struct holding RequestTimeoutSeconds, BlockPeriodSeconds, EpochLength, ProposerPolicy, MaxRequestTimeoutSeconds"
  - file: params/config_wbft.go
    symbol: "WBFTConfig.CheckValidity"
    reason: "rejects non-positive timing values and EpochLength < 2 at genesis time"

constants:
  - name: RequestTimeoutSeconds
    value: 2
    unit: "seconds"
    source_file: params/config_wbft.go
  - name: BlockPeriodSeconds
    value: 1
    unit: "seconds"
    source_file: params/config_wbft.go
  - name: EpochLength
    value: 10
    unit: "blocks"
    source_file: params/config_wbft.go

