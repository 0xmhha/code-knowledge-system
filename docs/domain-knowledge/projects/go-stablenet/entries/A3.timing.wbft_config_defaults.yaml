id: A3.timing.wbft_config_defaults
subsystem: A3
knowledge_type: B7
title: "WBFT timing and config defaults: RequestTimeout, BlockPeriod, EpochLength"

summary: |
  WBFT consensus timing is parameterised by RequestTimeoutSeconds (per-
  round timeout before bumping rounds), BlockPeriodSeconds (target
  inter-block interval enforced by the proposer), and EpochLength
  (blocks per epoch, after which the validator set transitions). The
  Anzeon default config (params/config_wbft.go DefaultAnzeonConfig) sets
  these to 2 / 1 / 10 respectively; chains may override per-network.
  CheckValidity enforces ranges at genesis load time.

  TWO LAYERS (the unit trap): the chain-config field RequestTimeoutSeconds
  is in SECONDS despite its struct comment saying "milliseconds"
  (config_wbft.go:187 comment is misleading). The runtime engine config
  (consensus/wbft/config.go) holds RequestTimeout in MILLISECONDS, and
  GetConfig bridges chain-config -> engine by multiplying x1000
  (config.go:167: RequestTimeout = RequestTimeoutSeconds * 1000). So the
  Anzeon 2 (seconds) becomes 2000ms at the engine. Separately, the engine
  struct DefaultConfig.RequestTimeout = 1000 (ms) is a fallback used when
  no chain-config transition supplies the value -- do NOT read the two
  defaults as one number.

code_anchors:
  - file: params/config_wbft.go
    symbol: WBFTConfig
