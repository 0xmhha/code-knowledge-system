invariants:
  - "RequestTimeoutSeconds and BlockPeriodSeconds are strictly positive; EpochLength is at least 2."
  - "Validator set transitions occur at block heights that are multiples of EpochLength."
  - "chain-config RequestTimeoutSeconds is SECONDS (not ms, despite the field comment); the engine value is ms after a x1000 bridge in GetConfig."

pitfalls:
  - "Reading RequestTimeoutSeconds as milliseconds (its struct comment says so, but GetConfig multiplies by 1000) -> 1000x wrong timeout."
  - "Conflating the engine DefaultConfig.RequestTimeout=1000ms with the Anzeon RequestTimeoutSeconds=2 (=2000ms after bridge); they are two different defaults in two files."

