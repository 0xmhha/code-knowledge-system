invariants:
  - "A non-legacy tx type is rejected from the pool until its activating fork is live (Berlin for any non-legacy, London for DynamicFee, Applepie for FeeDelegateDynamicFee, Cancun for Blob, Anzeon for SetCode)."
  - "A pool only admits tx types whose bit is set in opts.Accept; otherwise ErrTxTypeNotSupported is returned before any other validation."
  - "A FeeDelegateDynamicFee tx is admitted only if it declares a FeePayer and the signature-recovered fee-payer address equals that declared FeePayer, else ErrInvalidFeePayer."
  - "Fork gating is purely stateless (block number / global enable); fee-payer balance sufficiency is checked separately in ValidateTransactionWithState."
pitfalls:
  - "Adding a new tx type constant in transaction.go without adding a matching fork gate in ValidateTransaction lets the type into the pool unconditionally, regardless of fork activation."
  - "Anzeon is gated via AnzeonEnabled() (a global boolean), not via a block-number predicate like the other forks; copying the IsX(num) pattern for it is wrong."
  - "The fee-payer check in ValidateTransaction is stateless signature recovery only; forgetting the corresponding ValidateTransactionWithState balance check would let an underfunded fee-payer tx be accepted."
  - "FeeDelegateDynamicFeeTxType is 0x16 (decimal 22), not contiguous with the 0x00..0x04 range; off-by-one or range-based type handling will miss it."
