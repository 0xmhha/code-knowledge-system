id: A11.txpool.type_taxonomy_admission
subsystem: A11
knowledge_type: B1
title: "Transaction type taxonomy and txpool admission fork gates"
summary: |
  StableNet inherits geth's typed-transaction envelope and adds one
  proprietary type. The full taxonomy (core/types/transaction.go) is:
  LegacyTxType 0x00, AccessListTxType 0x01, DynamicFeeTxType 0x02,
  BlobTxType 0x03, SetCodeTxType 0x04, and StableNet's
  FeeDelegateDynamicFeeTxType 0x16 (decimal 22) for fee-delegated txs.

  Pool admission runs through txpool.ValidateTransaction (core/txpool/
  validation.go). After a per-pool capability check (opts.Accept bitmask)
  and a size check, each non-legacy type is gated behind a fork
  activation, in this source order: any non-legacy type requires Berlin;
  DynamicFee additionally requires London; FeeDelegateDynamicFee requires
  Applepie (StableNet's fee-delegation fork); Blob requires Cancun;
  SetCode requires Anzeon (checked via AnzeonEnabled(), a global enable
  rather than a block-number gate). A type whose fork is not yet active
  is rejected with core.ErrTxTypeNotSupported before any signature or
  state work.

  After the common gas/fee/sender checks, fee-delegated txs get an extra
  admission gate: the tx must carry a FeePayer address, and the fee-payer
  signature is recovered via types.FeePayer(NewFeeDelegateSigner(chainID),
  tx); if recovery fails or the recovered address does not equal the
  declared FeePayer, the tx is rejected with ErrInvalidFeePayer. This is
  the stateless half; the stateful fee-payer balance check lives later in
  ValidateTransactionWithState (ErrFeePayerInsufficientFunds).
