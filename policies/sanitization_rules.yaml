# cks Phase-0 baseline sanitization ruleset.
#
# Policy: matched data MUST NOT cross the cks -> caller -> LLM boundary.
# Baseline therefore uses only `drop` and `fail_closed`. `mask` is defined
# in the contract for operator opt-in but never appears here.
#
# Severities are advisory (used by Phase-3 alerting); they do not change
# the redaction action directly. `critical` rules are also routinely
# included in the FailClosedRules fast-path; the rule's action field is
# what actually controls boundary behavior.

version: 1
rules:
  - id: PRIVATE_KEY_PEM
    description: "PEM-encoded private key block (RSA/EC/OpenSSH/DSA)."
    pattern: '-----BEGIN ((RSA|EC|OPENSSH|DSA) )?PRIVATE KEY-----'
    action: fail_closed
    severity: critical

  - id: API_KEY_OPENAI
    description: "OpenAI API key (sk-... or sk-proj-... form)."
    pattern: '\bsk-(proj-)?[A-Za-z0-9_\-]{20,}\b'
    action: drop
    severity: critical

  - id: API_KEY_ANTHROPIC
    description: "Anthropic API key (sk-ant-... form)."
    pattern: '\bsk-ant-[A-Za-z0-9_\-]{40,}\b'
    action: drop
    severity: critical

  - id: API_KEY_AWS_ACCESS
    description: "AWS access key ID (AKIA + 16 uppercase alnum)."
    pattern: '\bAKIA[0-9A-Z]{16}\b'
    action: drop
    severity: critical

  - id: AWS_SECRET_KEY_ASSIGN
    description: "AWS secret access key assignment (key=value form)."
    pattern: '\baws_secret_access_key\s*[:=]\s*["''][A-Za-z0-9/+=]{40}["'']'
    action: drop
    severity: critical

  - id: JWT_TOKEN
    description: "JSON Web Token (three base64url parts joined by dots)."
    pattern: '\beyJ[A-Za-z0-9_\-]+\.eyJ[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+\b'
    action: drop
    severity: high

  - id: DB_URL_WITH_CREDS
    description: "Database URL with embedded user:password (postgres/mysql/mongodb)."
    pattern: '\b(postgres|postgresql|mysql|mongodb)(\+srv)?://[^:\s]+:[^@\s]+@\S+'
    action: drop
    severity: high

  - id: EMAIL_ADDRESS
    description: "Personal email addresses (PII)."
    pattern: '\b[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}\b'
    action: drop
    severity: medium
